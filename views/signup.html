<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
</head>
<body>
    <h1 id="head">Enter Your Details</h1>
    <form id="form">
        <input id="name" type="text" placeholder="Enter your name" required>
        <br><br>
        <input id="phone" type="text" placeholder="Enter your phone number" required>
        <br><br>
        <input id="email" type="email" placeholder="Enter your email" required>
        <br><br>
        <input id="password" type="password" placeholder="Create password" required>
        <br><br>
        <input id="confirmpass" type="password" placeholder="Confirm your password" required>
        <button type="submit" id="sendcode">Send Verification Code</button>
        <br><br>
        <input id="code" type="text" placeholder="Enter verification code" required>
        <br><br>
         <button type="button" id="verbtn">Verify Code</button>
        <br><br>
        <button type="submit" id="signupbtn">Signup</button>
        <br><br>
        <div id="message"></div>
    </form> 

    <script src="signup.js"></script>
</body>
</html>
