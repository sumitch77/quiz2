<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
    <link rel="stylesheet" href="/signup.css">
</head>
<body>
    <h1 id="head">Register</h1>
    <div id="warn">

    </div>
    <br>
    <form id="form" enctype="multipart/form-data">
        
<div class="card">
  <div>
    <p class="card-label">Profile Picture</p>
  </div>
 
  <div class="avatar-wrap" id="avatarWrap" onclick="document.getElementById('fileInput').click()">
    <div class="avatar-arc"></div>
    <div class="avatar-ring" id="avatarRing">
      <img id="avatarImg" class="avatar-img" alt="profile" />
      <div class="avatar-placeholder" id="placeholder">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        <span>Upload</span>
      </div>
      <div class="avatar-overlay" id="overlay">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <span>Change</span>
      </div>
    </div>
    <div class="tick" id="tick">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
  </div>
  <p class="filename" id="filename">No file chosen</p>
 
  <input type="file" name="filesend" id="fileInput" accept="image/*" />
</div>

<input type="text" name="name1" id="name1" autocomplete="name" placeholder="Enter your name">
<br><br>
<input type="tel" name="phone" id="phone" autocomplete="tel" placeholder="Phone Number">
<br><br>
<input type="email" name="email" id="email" autocomplete="email" placeholder="Email Address">
<br><br>
<input type="password" name="password" id="password" autocomplete="new-password" placeholder="Password">
<br><br>
<input type="password" name="confirmpass" id="confirmpass" autocomplete="new-password" placeholder="Confirm Password">
       <br><br> 
        <button type="submit" id="sendcode">Send Verification Code</button>
        <br><br>
        <input id="code" type="text" placeholder="Enter verification code" required>
        <br><br>
         <button type="button" id="verbtn">Verify Code</button>
        <br><br>
        <button type="submit" id="signupbtn">Signup</button>
        <br><br>
        <div id="message"></div>
        <br>
        <div id="error">Already have an account? <a href="/login">Login here</a></div>
    </form> 

    <script src="/signup.js"></script>
</body>
</html>
